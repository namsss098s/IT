{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>
    <link rel="stylesheet" href="{% static 'css/reset_password.css' %}">
</head>
<body>

<div class="container">

    <!-- Left Panel -->
    <div class="left-panel">
        <div class="logo">
            <img src="https://placehold.co/171x171" alt="logo">
        </div>

        <div class="university">
            EAST ASIA UNIVERSITY OF TECHNOLOGY
        </div>

        <div class="subtitle">
            Please enter a new password
        </div>
    </div>


    <!-- Right Panel -->
    <div class="right-panel">

        <a href="{% url 'accounts:login' %}" class="back-btn">BACK</a>

        <h2>Reset Password</h2>
        <p>Please enter your new password</p>

        <form method="POST">
            {% csrf_token %}

            <input type="password" name="password1" placeholder="New Password" required>

            <input type="password" name="password2" placeholder="Confirm Password" required>

            <button type="submit">RESET PASSWORD</button>

        </form>

    </div>

</div>

</body>
</html>
